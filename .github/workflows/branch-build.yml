name: Branch build

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: branch-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_PUBLIC_POSTHOG_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_TOKEN }}
          VITE_PUBLIC_POSTHOG_UI_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_UI_HOST }}
          VITE_PUBLIC_POSTHOG_API_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_API_HOST }}
          VITE_PUBLIC_STATCOUNTER_SECURITY: ${{ secrets.VITE_PUBLIC_STATCOUNTER_SECURITY }}
        run: npm run build
